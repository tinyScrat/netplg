<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0,shrink-to-fit=no" />
  <title>BlazorApp</title>
  <base href="/" />
  <link rel="preload" id="webassembly" />
  <link rel="preload" href="_content/Radzen.Blazor/fonts/MaterialSymbolsOutlined.woff2" as="font" type="font/woff2" crossorigin="anonymous">
  <link rel="stylesheet" href="_content/Radzen.Blazor/css/default-base.css?v=8.7.5.0" />
  <link rel="stylesheet" href="css/app.css" />
  <!-- <link href="Lpc.WebUI.styles.css" rel="stylesheet" /> -->
  <script type="importmap"></script>
</head>
<body>
  <div id="app">
    <svg class="loading-progress">
      <circle r="40%" cx="50%" cy="50%" />
      <circle r="40%" cx="50%" cy="50%" />
    </svg>
    <div class="loading-progress-text"></div>
  </div>

  <div id="blazor-error-ui">
      An unhandled error has occurred.
    <a href="." class="reload">Reload</a>
    <span class="dismiss">🗙</span>
  </div>

  <script>
      /* Monkey patch the localStorage onto the sessionStorage variable and accessor

          Since oidc-client-js by default uses sessionStorage and the Blazor AuthenticationService
          wrapper around it does not allow changing the configuration of that to localStorage,
          and because the wrapper directly uses window.sessionStorage for its own additional data,
          we have to change the global variable and the window property to point to localStorage instead.
      */
      const originalSessionStorage = window.sessionStorage;
      const sessionStorage = window.localStorage;
      Object.defineProperty(window, 'sessionStorage', { get: () => window.localStorage });

      // Save return URL on page load and before unload (refresh/close)
      function saveReturnUrl() {
          if (!window.location.pathname.startsWith('/authentication/')) {
              localStorage.setItem('returnUrl', window.location.pathname + window.location.search);
          }
      }

      saveReturnUrl();
      window.addEventListener('beforeunload', saveReturnUrl);
  </script>
  <script src="_content/Microsoft.AspNetCore.Components.WebAssembly.Authentication/AuthenticationService.js"></script>
  <script src="_content/Radzen.Blazor/Radzen.Blazor.min.js"></script>
  <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
</body>
</html>
